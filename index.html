<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Mio Canzoniere</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root {
  --bg: #ead5f5;
  --surface: #dcc0ee;
  --surface2: #ceaee6;
  --border: #b48fd4;
  --accent: #5a1a8a;
  --text: #1a0a2e;
  --muted: #6a4f80;
  --danger: #c0634a;
  --success: #4a8c55;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  font-size: 14px;
}

/* ── LOCK SCREEN ── */
#lockScreen {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 28px;
}
#lockScreen h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 7vw, 4rem);
  color: var(--accent);
  letter-spacing: -0.02em;
  font-style: italic;
  text-align: center;
}
#lockScreen .sub {
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-top: 4px;
  text-align: center;
}
.lock-box {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  width: min(300px, 88vw);
}
.lock-box input[type=password] {
  width: 100%;
  background: #fff;
  border: 2px solid var(--border);
  color: var(--accent);
  padding: 14px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  letter-spacing: 0.4em;
  text-align: center;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.2s;
}
.lock-box input[type=password]:focus { border-color: var(--accent); }
#lockError { color: var(--danger); font-size: 11px; min-height: 16px; }
.lock-hint { color: var(--muted); font-size: 10px; text-align: center; line-height: 1.7; }

/* ── BUTTONS ── */
.btn {
  -webkit-appearance: none;
  appearance: none;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 22px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: #6a2f8f; }
.btn:active { transform: scale(0.97); }
.btn.ghost {
  background: var(--surface2);
  color: var(--accent);
  border: 2px solid var(--accent);
  font-weight: 500;
}
.btn.ghost:hover { background: var(--accent); color: #fff; }
.btn.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn.danger:hover { background: var(--danger); color: #fff; }
.btn.sm { padding: 7px 14px; font-size: 11px; }
.btn.full { width: 100%; }
.btn.back {
  background: transparent;
  color: var(--accent);
  border: 2px solid var(--accent);
  padding: 8px 18px;
  font-size: 13px;
  border-radius: 8px;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn.back:hover { background: var(--accent); color: #fff; }

/* ── APP ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* ── HEADER ── */
header {
  padding: 16px 20px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--accent);
  font-style: italic;
  flex-shrink: 0;
}
.search-wrap {
  flex: 1; min-width: 160px; position: relative;
}
.search-wrap input {
  width: 100%;
  background: #fff;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px 8px 34px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap .ico {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--muted); pointer-events: none;
}
.count-badge { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; flex-shrink: 0; }

/* ── VIEWS ── */
#viewList, #viewLyrics { display: none; flex-direction: column; }
#viewList.active, #viewLyrics.active { display: flex; }

/* ── LIST VIEW ── */
#viewList { padding: 0; }
.song-item {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
  display: flex; align-items: center; justify-content: space-between;
}
.song-item:hover { background: var(--surface); }
.song-item .info .st {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: var(--text);
  font-weight: 700;
}
.song-item .info .sa {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.song-item .arrow { color: var(--border); font-size: 20px; flex-shrink: 0; }
.empty-list {
  padding: 60px 24px;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  line-height: 2.2;
}
.empty-list .big { font-size: 3rem; opacity: 0.25; margin-bottom: 12px; }

/* ── LYRICS VIEW ── */
#viewLyrics {
  min-height: calc(100vh - 57px);
}
.lyrics-header {
  padding: 20px 24px 16px;
  border-bottom: 2px solid var(--border);
  background: var(--surface);
  display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap;
}
.lyrics-header-text { flex: 1; }
.lyrics-header-text .lt {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--text);
  font-weight: 700;
  line-height: 1.2;
}
.lyrics-header-text .la {
  color: var(--accent);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 4px;
}
.lyrics-header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.lyrics-body {
  padding: 28px 24px;
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  line-height: 2.1;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  flex: 1;
}

/* ── MODAL ── */
#modal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(90,40,120,0.35);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(3px);
}
#modal.open { display: flex; }
.modal-box {
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 12px;
  width: min(620px, 100%);
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  display: flex; flex-direction: column; gap: 18px;
}
.modal-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; color: var(--accent); font-style: italic;
}
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 10px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
.field input, .field textarea {
  background: #fff;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.2s;
  resize: vertical;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { min-height: 220px; line-height: 1.8; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; margin-top: 4px; }

/* ── DROP ZONE ── */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.8;
  position: relative;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(123,63,160,0.05);
  color: var(--text);
}
.drop-zone input[type=file] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-zone .dz-icon { font-size: 1.8rem; margin-bottom: 6px; opacity: 0.4; }
.file-status { font-size: 11px; padding: 8px 12px; border-radius: 6px; display: none; }
.file-status.ok { background: rgba(74,140,85,0.1); color: var(--success); border: 1px solid rgba(74,140,85,0.3); display: block; }
.file-status.err { background: rgba(192,99,74,0.1); color: var(--danger); border: 1px solid rgba(192,99,74,0.3); display: block; }
.file-status.loading { background: rgba(123,63,160,0.08); color: var(--accent); border: 1px solid rgba(123,63,160,0.2); display: block; }

/* ── SETTINGS ── */
#settingsModal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(90,40,120,0.35);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(3px);
}
#settingsModal.open { display: flex; }

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: 10px;
  color: var(--muted); font-size: 10px; letter-spacing: 0.1em;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 999;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- LOCK -->
<div id="lockScreen">
  <div>
    <h1>Il Mio Canzoniere</h1>
    <div class="sub">archivio privato</div>
  </div>
  <div class="lock-box">
    <input type="password" id="pwdInput" placeholder="••••••" autocomplete="off" />
    <div id="lockError"></div>
    <button class="btn full" onclick="unlock()">Entra</button>
    <div class="lock-hint">Password predefinita: <strong>1234</strong><br>Cambiala dalle ⚙ Impostazioni</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>♪ Il Mio Canzoniere</h1>
    <div class="search-wrap" id="searchWrap">
      <span class="ico">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" id="searchInput" placeholder="Cerca titolo o artista…" oninput="renderList()">
    </div>
    <span class="count-badge" id="countBadge">0 canzoni</span>
    <button class="btn sm" id="btnAdd" onclick="openModal()">+ Aggiungi</button>
    <button class="btn ghost sm" onclick="openSettings()">⚙</button>
  </header>

  <!-- LIST VIEW -->
  <div id="viewList" class="active">
    <div id="songList"></div>
  </div>

  <!-- LYRICS VIEW -->
  <div id="viewLyrics">
    <div class="lyrics-header">
      <div class="lyrics-header-text">
        <div class="lt" id="lyricsTitle"></div>
        <div class="la" id="lyricsArtist"></div>
      </div>
      <div class="lyrics-header-actions">
        <button class="btn back" onclick="showList()">← Indietro</button>
        <button class="btn ghost sm" id="btnEdit" onclick="editCurrent()">✏ Modifica</button>
        <button class="btn danger sm" id="btnDelete" onclick="deleteCurrent()">🗑</button>
      </div>
    </div>
    <div class="lyrics-body" id="lyricsBody"></div>
  </div>
</div>

<!-- MODAL AGGIUNGI/MODIFICA -->
<div id="modal">
  <div class="modal-box">
    <h2 id="modalTitle">Nuova canzone</h2>
    <div class="field">
      <label>Titolo *</label>
      <input type="text" id="fTitle" placeholder="Es. Come un pittore" />
    </div>
    <div class="field">
      <label>Artista</label>
      <input type="text" id="fArtist" placeholder="Es. Modà" />
    </div>
    <div class="divider">oppure carica un file</div>
    <div class="drop-zone" id="dropZone"
         ondragover="dzDragOver(event)" ondragleave="dzDragLeave(event)" ondrop="dzDrop(event)">
      <div class="dz-icon">📄</div>
      <div>Trascina qui un file <strong>.txt</strong>, <strong>.pdf</strong> o <strong>.docx</strong><br>oppure clicca per sceglierlo</div>
      <input type="file" id="fileInput" accept=".txt,.pdf,.docx" onchange="handleFile(this.files[0])">
    </div>
    <div class="file-status" id="fileStatus"></div>
    <div class="field">
      <label>Testo</label>
      <textarea id="fLyrics" placeholder="Incolla o scrivi il testo qui…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Annulla</button>
      <button class="btn" onclick="saveSong()">Salva</button>
    </div>
  </div>
</div>

<!-- MODAL IMPOSTAZIONI -->
<div id="settingsModal">
  <div class="modal-box" style="max-width:400px">
    <h2>Impostazioni</h2>
    <div class="field">
      <label>Password attuale</label>
      <input type="password" id="sPwdOld" placeholder="••••••" />
    </div>
    <div class="field">
      <label>Nuova password</label>
      <input type="password" id="sPwdNew" placeholder="••••••" />
    </div>
    <div class="field">
      <label>Conferma nuova password</label>
      <input type="password" id="sPwdConf" placeholder="••••••" />
    </div>
    <div id="pwdMsg" style="font-size:11px;min-height:16px;"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeSettings()">Chiudi</button>
      <button class="btn" onclick="changePassword()">Cambia password</button>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <span style="font-size:11px;color:var(--muted);">Esporta tutto come JSON</span>
      <button class="btn ghost sm" onclick="exportData()">Esporta</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <span style="font-size:11px;color:var(--muted);">Importa da file JSON</span>
      <label class="btn ghost sm" style="cursor:pointer;">
        Importa
        <input type="file" accept=".json" style="display:none" onchange="importData(event)">
      </label>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const STORE_KEY = 'canzoniere_songs';
const PWD_KEY   = 'canzoniere_pwd';
const DEFAULT_PWD = '1234';

function getHash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
  return (h >>> 0).toString(36);
}
function getPwd() { return localStorage.getItem(PWD_KEY) || getHash(DEFAULT_PWD); }
function getSongs() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; } }
function setSongs(arr) { localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }

// ── LOCK ──
document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
function unlock() {
  const val = document.getElementById('pwdInput').value;
  const stored = getPwd();
  const isDefault = stored === getHash(DEFAULT_PWD) && val === DEFAULT_PWD;
  if (isDefault || stored === getHash(val)) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderList();
  } else {
    const el = document.getElementById('lockError');
    el.textContent = 'Password errata.';
    document.getElementById('pwdInput').value = '';
    setTimeout(() => el.textContent = '', 2000);
  }
}

// ── VIEWS ──
function showList() {
  document.getElementById('viewList').className = 'active';
  document.getElementById('viewLyrics').className = '';
  document.getElementById('searchWrap').style.display = '';
  document.getElementById('btnAdd').style.display = '';
  currentId = null;
  renderList();
}

function showLyrics(id) {
  const s = getSongs().find(x => x.id === id);
  if (!s) return;
  currentId = id;
  document.getElementById('lyricsTitle').textContent = s.title;
  document.getElementById('lyricsArtist').textContent = s.artist || '';
  document.getElementById('lyricsBody').textContent = s.lyrics;
  document.getElementById('viewList').className = '';
  document.getElementById('viewLyrics').className = 'active';
  document.getElementById('searchWrap').style.display = 'none';
  document.getElementById('btnAdd').style.display = 'none';
  window.scrollTo(0,0);
}

// ── LIST ──
let currentId = null;

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const songs = getSongs().filter(s =>
    s.title.toLowerCase().includes(q) || (s.artist||'').toLowerCase().includes(q)
  );
  document.getElementById('countBadge').textContent = getSongs().length + ' canzon' + (getSongs().length === 1 ? 'e' : 'i');
  const list = document.getElementById('songList');
  if (!songs.length) {
    list.innerHTML = `<div class="empty-list"><div class="big">♫</div>Nessuna canzone trovata.<br>Premi <strong>+ Aggiungi</strong> per iniziare.</div>`;
    return;
  }
  list.innerHTML = songs.map(s => `
    <div class="song-item" onclick="showLyrics('${s.id}')">
      <div class="info">
        <div class="st">${esc(s.title)}</div>
        ${s.artist ? `<div class="sa">${esc(s.artist)}</div>` : ''}
      </div>
      <div class="arrow">›</div>
    </div>
  `).join('');
}

// ── EDIT / DELETE ──
function editCurrent() { if (currentId) openModal(currentId); }
function deleteCurrent() {
  if (!currentId) return;
  if (!confirm('Eliminare questa canzone?')) return;
  setSongs(getSongs().filter(s => s.id !== currentId));
  showList();
  showToast('Canzone eliminata.');
}

// ── MODAL ──
let editingId = null;
function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Modifica canzone' : 'Nuova canzone';
  clearFileStatus();
  document.getElementById('fileInput').value = '';
  if (id) {
    const s = getSongs().find(x => x.id === id);
    document.getElementById('fTitle').value  = s.title;
    document.getElementById('fArtist').value = s.artist || '';
    document.getElementById('fLyrics').value = s.lyrics;
  } else {
    document.getElementById('fTitle').value  = '';
    document.getElementById('fArtist').value = '';
    document.getElementById('fLyrics').value = '';
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); editingId = null; }

function saveSong() {
  const title  = document.getElementById('fTitle').value.trim();
  const artist = document.getElementById('fArtist').value.trim();
  const lyrics = document.getElementById('fLyrics').value.trim();
  if (!title) { alert('Il titolo è obbligatorio.'); return; }
  const songs = getSongs();
  if (editingId) {
    const idx = songs.findIndex(s => s.id === editingId);
    if (idx !== -1) { songs[idx].title = title; songs[idx].artist = artist; songs[idx].lyrics = lyrics; }
    setSongs(songs);
    closeModal();
    showLyrics(editingId);
  } else {
    const newId = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
    songs.push({ id: newId, title, artist, lyrics });
    setSongs(songs);
    closeModal();
    renderList();
  }
  showToast(editingId ? 'Canzone aggiornata.' : 'Canzone aggiunta!');
}

// ── FILE IMPORT ──
function dzDragOver(e)  { e.preventDefault(); document.getElementById('dropZone').classList.add('dragover'); }
function dzDragLeave(e) { document.getElementById('dropZone').classList.remove('dragover'); }
function dzDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}
function setFileStatus(type, msg) {
  const el = document.getElementById('fileStatus');
  el.className = 'file-status ' + type;
  el.textContent = msg;
}
function clearFileStatus() {
  const el = document.getElementById('fileStatus');
  el.className = 'file-status'; el.textContent = '';
}

async function handleFile(file) {
  if (!file) return;
  const name = file.name.toLowerCase();
  setFileStatus('loading', '⏳ Lettura file in corso…');
  if (!document.getElementById('fTitle').value.trim()) {
    document.getElementById('fTitle').value = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
  }
  try {
    if (name.endsWith('.txt')) {
      document.getElementById('fLyrics').value = await file.text();
      setFileStatus('ok', '✓ File .txt caricato.');
    } else if (name.endsWith('.pdf')) {
      await readPDF(file);
    } else if (name.endsWith('.docx')) {
      await readDOCX(file);
    } else {
      setFileStatus('err', '⚠ Formato non supportato.');
    }
  } catch(err) { setFileStatus('err', '⚠ Errore: ' + err.message); }
}

async function readPDF(file) {
  const lib = window['pdfjs-dist/build/pdf'];
  lib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf = await lib.getDocument({ data: await file.arrayBuffer() }).promise;
  let text = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    text += content.items.map(i => i.str).join(' ') + '\n';
  }
  document.getElementById('fLyrics').value = text.trim();
  setFileStatus('ok', `✓ PDF letto (${pdf.numPages} pagina/e).`);
}

async function readDOCX(file) {
  const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
  document.getElementById('fLyrics').value = result.value.trim();
  setFileStatus('ok', '✓ File .docx caricato.');
}

// ── IMPOSTAZIONI ──
function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
  ['sPwdOld','sPwdNew','sPwdConf'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pwdMsg').textContent = '';
}
function changePassword() {
  const old = document.getElementById('sPwdOld').value;
  const nw  = document.getElementById('sPwdNew').value;
  const cf  = document.getElementById('sPwdConf').value;
  const msg = document.getElementById('pwdMsg');
  const stored = getPwd();
  const isDefault = stored === getHash(DEFAULT_PWD) && old === DEFAULT_PWD;
  if (!isDefault && stored !== getHash(old)) { msg.style.color='var(--danger)'; msg.textContent='Password attuale errata.'; return; }
  if (nw.length < 3) { msg.style.color='var(--danger)'; msg.textContent='Minimo 3 caratteri.'; return; }
  if (nw !== cf)     { msg.style.color='var(--danger)'; msg.textContent='Le password non coincidono.'; return; }
  localStorage.setItem(PWD_KEY, getHash(nw));
  msg.style.color='var(--success)'; msg.textContent='✓ Password cambiata!';
  setTimeout(closeSettings, 1500);
}

// ── EXPORT / IMPORT ──
function exportData() {
  const blob = new Blob([JSON.stringify({ songs: getSongs() }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'canzoniere_backup.json'; a.click();
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const obj = JSON.parse(evt.target.result);
      if (!Array.isArray(obj.songs)) throw new Error('Formato non valido.');
      const merged = [...getSongs()];
      obj.songs.forEach(s => { if (!merged.find(x => x.id === s.id)) merged.push(s); });
      setSongs(merged); renderList();
      showToast(`Importate ${obj.songs.length} canzoni.`); closeSettings();
    } catch(err) { alert('Errore: ' + err.message); }
  };
  reader.readAsText(file);
}

// ── UTILS ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeSettings(); }
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.getElementById('settingsModal').addEventListener('click', e => {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
});
</script>
